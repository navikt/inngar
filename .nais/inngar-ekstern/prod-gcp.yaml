apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: inngar-ekstern
  namespace: dab
  labels:
    team: dab
spec:
  image: {{ image }}
  port: 3000
  replicas:
    min: 1
    max: 2
  resources:
    requests:
      cpu: 50m
  ingresses:
    - https://start-arbeidsoppfolging.nav.no
  liveness:
    initialDelay: 5
    path: /internal/isAlive
  readiness:
    initialDelay: 5
    path: /internal/isReady
  accessPolicy:
    outbound:
      rules:
        - application: veilarboppfolging
          namespace: poao
        - application: nav-dekoratoren
          namespace: personbruker
      external:
        - host: cdn.nav.no
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: elastic
        - id: loki
  idporten:
    enabled: true
    sidecar:
      enabled: true
      level: idporten-loa-high
      autoLogin: true
  tokenx:
    enabled: true
